                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    <span>复习</span>

    <main class="flex-grow max-w-4xl mx-auto w-full p-4 md:p-6 relative">

        <!-- ================= 标签 2：管理区 ================= -->
        <div id="view-manage" class="tab-hidden space-y-6">
            
            <!-- 增量同步引擎控制台 -->
            <div class="bg-gradient-to-r from-blue-50 to-indigo-50 p-4 rounded-xl shadow-sm border border-blue-100 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3 w-full md:w-auto">

                    <div class="flex-grow">
                        <h3 class="font-bold text-gray-800 text-sm">云端增量同步引擎</h3>
                        <p id="cloud-status" class="text-xs text-gray-500">正在检查本地密钥...</p>
                    </div>
                </div>
                
                <div id="setup-section" class="hidden w-full md:w-auto flex flex-col sm:flex-row gap-2">

                </div>

                    <button onclick="handleAuthClick()" class="whitespace-nowrap bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">点击授权连接</button>
                </div>

                <div id="sync-section" class="hidden flex gap-2 w-full md:w-auto">

                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        执行差异合并同步

            </div>

            <!-- 录入区 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <div class="p-4 border-b border-gray-100 bg-gray-50/50 rounded-t-xl flex items-center gap-4">
                    <h3 class="font-medium text-gray-700">添加新知识</h3>
                    <div class="h-5 w-px bg-gray-200"></div>
                    <button onclick="document.getElementById('image-upload-input').click()" class="flex items-center gap-1.5 text-sm text-gray-600 hover:text-blue-600 hover:bg-blue-50 px-2.5 py-1.5 rounded transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        插入大图片 (单存结构)
                    </button>
                    <input type="file" id="image-upload-input" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                </div>
                <div class="p-4">
                    <div id="rich-input" contenteditable="true" placeholder="在此输入文字、粘贴图片或直接拖拽图片进来..." 
                         class="rich-text w-full min-h-[150px] max-h-[400px] overflow-y-auto p-4 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"></div>
                </div>
                <div class="p-4 pt-0 flex justify-end">

            <!-- 列表管理区 -->

        <!-- ================= 标签 3：回收站 ================= -->

                        <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        <h3 class="font-bold text-red-700">废纸篓 (墓碑缓存区)</h3>
                    </div>
                    <span id="trash-count" class="text-sm text-red-500">共 0 条</span>
                </div>
                <div id="trash-list" class="divide-y divide-gray-100 max-h-[600px] overflow-y-auto"></div>

    <!-- 全局 Loading 遮罩层 -->
    <div id="loading-overlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden flex-col items-center justify-center z-[100] transition-opacity">
        <svg class="spinner w-12 h-12 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p id="loading-text" class="text-white font-medium text-lg tracking-wide">正在初始化引擎...</p>
        <p id="loading-subtext" class="text-gray-400 text-sm mt-2">请勿关闭页面</p>
    </div>

    <!-- Toast 提示框 -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg opacity-0 pointer-events-none transition-opacity duration-300 z-50 flex items-center gap-2 max-w-[90%] whitespace-nowrap">
        <span id="toast-icon"></span>
        <span id="toast-message"></span>
    </div>

    <!-- ========================================== 核心逻辑脚本 ========================================== -->
    <script>
        // ================= 谷歌授权与目录配置 =================
        const CLIENT_ID_STORAGE_KEY = 'google_drive_client_id';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        
        // 核心变化：将元数据与文件分离！
        const META_FILE_NAME = '_Spaced_Review_Metadata_V2_.json'; 
        const FOLDER_ID = '11qcpdV5LN44497q5HsPtXxNbq7yr04gB'; // 你指定的云端文件夹 ID
        
        let tokenClient;
        let accessToken = null;

        // --- 核心状态 ---
        let allItems = []; 
        let simulatedDate = new Date();
        let currentIndex = 0;
        let currentTab = 'review';

        // --- IndexedDB 本地存储底层 ---
        const DB_NAME = 'SpacedRepetitionDB';
        const STORE_NAME = 'keyval';
        const DATA_KEY = 'spacedRepetitionData';

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 2); // 升级版本号应对结构变化
                request.onupgradeneeded = (e) => {
                    if (!e.target.result.objectStoreNames.contains(STORE_NAME)) {
                        e.target.result.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function loadFromStorage() {
            try {
                const db = await openDB();
                const transaction = db.transaction(STORE_NAME, 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(DATA_KEY);
                request.onsuccess = () => {
                    if (request.result) {
                        allItems = request.result;
                        // 数据迁移处理老数据补全缺省字段
                        allItems.forEach(item => {
                            if(item.trashed === undefined) item.trashed = false;
                            if(item.isDeleted === undefined) item.isDeleted = false;
                        });
                    }
                    renderApp(); 
                };
            } catch (e) {
                console.error("加载数据失败", e);
                showToast("底层数据库读取失败", "error");
                renderApp();
            }
        }

        async function saveToStorage() {
            try {
                const db = await openDB();
                const transaction = db.transaction(STORE_NAME, 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                store.put(allItems, DATA_KEY);
            } catch (e) {
                showToast('本地保存失败，请检查浏览器权限。', 'error');
            }
        }

        // --- 初始化入口 ---
        window.onload = () => {
            requestNotificationPermission();
            startNotificationCron();
            setupRichTextEditorEvents(); 
            loadFromStorage(); 
            checkAndInitGoogleAuth();
        };

        // ================= Google Drive 动态授权逻辑 =================
        function checkAndInitGoogleAuth() {
            const savedClientId = localStorage.getItem(CLIENT_ID_STORAGE_KEY);
            if (savedClientId && savedClientId.trim() !== '') {
                document.getElementById('cloud-status').innerText = '密钥已加载，请点击授权连接';
                document.getElementById('cloud-status').classList.replace('text-red-500', 'text-gray-500');
                document.getElementById('setup-section').classList.add('hidden');
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('sync-section').classList.add('hidden');
                
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: savedClientId.trim(),
                    scope: SCOPES,
                    callback: (tokenResponse) => {
                        accessToken = tokenResponse.access_token;
                        document.getElementById('auth-section').classList.add('hidden');
                        document.getElementById('sync-section').classList.remove('hidden');
                        document.getElementById('cloud-status').innerText = '增量引擎已就绪';
                        document.getElementById('cloud-status').classList.replace('text-gray-500', 'text-green-600');
                        showToast('已安全连接云端节点', 'success');
                    },
                });
            } else {
                document.getElementById('cloud-status').innerText = '请配置 Client ID 以激活引擎';
                document.getElementById('cloud-status').classList.replace('text-gray-500', 'text-orange-500');
                document.getElementById('setup-section').classList.remove('hidden');
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('sync-section').classList.add('hidden');
            }
        }

        function saveClientId() {
            const inputVal = document.getElementById('client-id-input').value;
            if (!inputVal || inputVal.trim() === '') return showToast('请粘贴有效密钥', 'error');
            localStorage.setItem(CLIENT_ID_STORAGE_KEY, inputVal.trim());
            showToast('密钥已入库', 'success');
            checkAndInitGoogleAuth();
        }

        function clearClientId() {
            if (confirm("确定要清除本地缓存的 Google Client ID 吗？")) {
                localStorage.removeItem(CLIENT_ID_STORAGE_KEY);
                accessToken = null;
                tokenClient = null;
                document.getElementById('client-id-input').value = '';
                document.getElementById('cloud-status').classList.replace('text-green-600', 'text-gray-500');
                checkAndInitGoogleAuth();
                showToast('密钥已清除', 'success');
            }
        }

        function handleAuthClick() {
            if (!tokenClient) return showToast("未配置客户端", "error");
            tokenClient.requestAccessToken();
        }

        function showLoading(mainText, subText = "这取决于数据的增量，请耐心等待") {
            document.getElementById('loading-text').innerText = mainText;
            document.getElementById('loading-subtext').innerText = subText;
            document.getElementById('loading-overlay').classList.replace('hidden', 'flex');
        }

        function hideLoading() {
            document.getElementById('loading-overlay').classList.replace('flex', 'hidden');
        }

        // ================= 全新 Delta Sync 增量引擎 =================
        async function fetchDriveAPI(url, options = {}) {
            options.headers = { ...options.headers, 'Authorization': `Bearer ${accessToken}` };
            const res = await fetch(url, options);
            if (!res.ok) throw new Error(`Drive API Error: ${res.status}`);
            return res.json();
        }

        async function findFileByName(fileName) {
            const query = `name='${fileName}' and '${FOLDER_ID}' in parents and trashed=false`;
            const data = await fetchDriveAPI(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&spaces=drive`);
            return data.files && data.files.length > 0 ? data.files[0].id : null;
        }

        async function uploadFileContent(fileName, contentStr, existingFileId = null) {
            const boundary = '-------314159265358979323846';
            const delimiter = "\r\n--" + boundary + "\r\n";
            const close_delim = "\r\n--" + boundary + "--";
            
            const metadata = existingFileId ? {} : { name: fileName, parents: [FOLDER_ID] };
            const multipartBody = delimiter + 
                'Content-Type: application/json; charset=UTF-8\r\n\r\n' + JSON.stringify(metadata) + delimiter +
                'Content-Type: application/json\r\n\r\n' + contentStr + close_delim;

            const url = existingFileId 
                ? `https://www.googleapis.com/upload/drive/v3/files/${existingFileId}?uploadType=multipart`
                : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;

            const data = await fetchDriveAPI(url, {
                method: existingFileId ? 'PATCH' : 'POST',
                headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
                body: multipartBody
            });
            return data.id;
        }

        async function downloadFileContent(fileId) {
            const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            if (!res.ok) throw new Error("下载块失败");
            return res.json();
        }

        // 核心同步入口
        async function smartDeltaSync() {
            if (!accessToken) return handleAuthClick();

            showLoading("正在拉取云端目录索引...");
            try {
                // 1. 获取云端元数据索引
                let cloudMetaId = await findFileByName(META_FILE_NAME);
                let cloudMetadata = [];
                if (cloudMetaId) {
                    cloudMetadata = await downloadFileContent(cloudMetaId);
                }

                // 2. 建立双向对比字典 (Dict)
                const cloudMap = new Map(cloudMetadata.map(i => [i.id, i]));
                const toUploadLocalItems = []; 
                const toDownloadCloudMeta = []; 

                // 3. 交叉比对与冲突解决
                // 3.1 本地扫云端
                for (const local of allItems) {
                    const cloud = cloudMap.get(local.id);
                    if (!cloud) {
                        // 本地有，云端完全没有 -> 需要将内容作为一个独立文件上传，并加入索引
                        toUploadLocalItems.push(local);
                    } else {
                        // 两边都有，根据业务逻辑，内容永不改变，只比对时间戳（排期/删除状态）
                        if (local.dateAdded > cloud.dateAdded) {
                            // 本地的状态更新，采用本地状态，不用重传大文件，只需继承其云端文件id
                            local.driveFileId = cloud.driveFileId;
                        } else if (local.dateAdded < cloud.dateAdded) {
                            // 云端的状态更新 -> 覆盖本地的元数据
                            local.dateAdded = cloud.dateAdded;
                            local.trashed = cloud.trashed;
                            local.isDeleted = cloud.isDeleted;
                            local.driveFileId = cloud.driveFileId;
                            
                            // 墓碑处理：如果云端被判定为彻底粉碎，本地也清空大文件
                            if (local.isDeleted) local.htmlContent = "";
                        }
                    }
                }

                const localMap = new Map(allItems.map(i => [i.id, i]));
                
                // 3.2 云端扫本地
                for (const cloud of cloudMetadata) {
                    if (!localMap.has(cloud.id)) {
                        // 云端有，本地没有 -> 需要去云端拉取这个独立的大碎片文件（如果它不是墓碑的话）
                        toDownloadCloudMeta.push(cloud);
                    }
                }

                // 4. 执行按需下载 (仅针对缺失碎片)
                for (let i = 0; i < toDownloadCloudMeta.length; i++) {
                    const cMeta = toDownloadCloudMeta[i];
                    showLoading(`正在下载云端缺失碎片...`, `进度: ${i + 1} / ${toDownloadCloudMeta.length}`);
                    
                    let newHtmlContent = "";
                    // 如果不是墓碑，才去下载真正的内容
                    if (!cMeta.isDeleted && cMeta.driveFileId) {
                        try {
                            const contentBlob = await downloadFileContent(cMeta.driveFileId);
                            newHtmlContent = contentBlob.htmlContent;
                        } catch(e) {
                            console.warn("碎片下载失败可能已丢失", e);
                        }
                    }
                    
                    allItems.push({
                        id: cMeta.id,
                        rawText: cMeta.rawText,
                        htmlContent: newHtmlContent,
                        dateAdded: cMeta.dateAdded,
                        trashed: cMeta.trashed,
                        isDeleted: cMeta.isDeleted,
                        driveFileId: cMeta.driveFileId
                    });
                }

                // 5. 执行按需上传 (本地独有或比云端新的文件)
                for (let i = 0; i < toUploadLocalItems.length; i++) {
                    const localItem = toUploadLocalItems[i];
                    // 如果该任务已经是空内容或者是墓碑，就不必浪费流量上传不存在的文件了
                    if (localItem.isDeleted || !localItem.htmlContent) continue;

                    showLoading(`正在上传新知识原图...`, `进度: ${i + 1} / ${toUploadLocalItems.length}`);
                    try {
                        const individualFileName = `${localItem.id}.json`;
                        // 检索该大文件是否已经在云端目录中独立存在
                        let individualFileId = await findFileByName(individualFileName);
                        const individualPayload = JSON.stringify({ htmlContent: localItem.htmlContent });
                        
                        individualFileId = await uploadFileContent(individualFileName, individualPayload, individualFileId);
                        localItem.driveFileId = individualFileId;
                    } catch (e) {
                        console.error("上传单独大文件失败", e);
                    }
                }

                // 重新将合并后的数据整理成数组，并倒序排列
                allItems.sort((a, b) => b.dateAdded - a.dateAdded);
                await saveToStorage(); 
                renderApp();

                // 6. 将最轻量、纯净的索引推回云端目录
                showLoading("同步进入尾声", "正在更新云端灯塔索引...");
                const newCloudMetadata = allItems.map(i => ({
                    id: i.id,
                    rawText: i.rawText,
                    dateAdded: i.dateAdded,
                    trashed: i.trashed,
                    isDeleted: i.isDeleted,
                    driveFileId: i.driveFileId
                }));

                await uploadFileContent(META_FILE_NAME, JSON.stringify(newCloudMetadata), cloudMetaId);
                showToast(`差异合并完美结束！新增↓${toDownloadCloudMeta.length} ↑${toUploadLocalItems.length}`, "success");

            } catch (error) {
                console.error("同步引擎熔断:", error);
                showToast("同步过程被中断，请检查网络", "error");
            } finally {
                hideLoading();
            }
        }

        // ================= 数据状态流转机制 (废纸篓与墓碑) =================
        function saveNewItem() {
            const editor = document.getElementById('rich-input');
            const htmlContent = editor.innerHTML;
            const tempDiv = document.createElement("div");
            tempDiv.innerHTML = htmlContent;
            let rawText = tempDiv.innerText || tempDiv.textContent;
            
            if (rawText.trim() === '' && htmlContent.includes('<img')) rawText = "[大图碎片]";
            else if (rawText.trim() === '') return showToast('不能保存空内容哦', 'error');

            const newItem = {
                id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
                htmlContent: htmlContent,
                rawText: rawText,
                dateAdded: new Date().getTime(),
                trashed: false,
                isDeleted: false,
                driveFileId: null
            };

            allItems.unshift(newItem); 
            saveToStorage(); 
            editor.innerHTML = ''; 
            showToast('已录入缓存池，等待日后同步', 'success');
            renderApp();
        }

        function updateItemDate(id, newDateString) {
            const item = allItems.find(i => i.id === id);
            if (item && newDateString) {
                const newDate = new Date(newDateString);
                const oldDate = new Date(item.dateAdded);
                newDate.setHours(oldDate.getHours(), oldDate.getMinutes(), oldDate.getSeconds());
                item.dateAdded = newDate.getTime();
                saveToStorage(); 
                showToast('排期变更已被记录', 'success');
            }
        }

        // 移入废纸篓 (软删除)
        function moveToTrash(id) {
            const item = allItems.find(i => i.id === id);
            if (item) {
                item.trashed = true;
                item.dateAdded = new Date().getTime(); // 刷新时间戳以触发同步
                saveToStorage();
                renderApp();
                showToast('已移入废纸篓', 'success');
            }
        }

        // 从废纸篓恢复
        function restoreFromTrash(id) {
            const item = allItems.find(i => i.id === id);
            if (item) {
                item.trashed = false;
                item.dateAdded = new Date().getTime(); 
                saveToStorage();
                renderApp();
                showToast('已恢复至复习队列', 'success');
            }
        }

        // 彻底粉碎 (墓碑化)
        async function permanentlyDelete(id) {
            if (!confirm("警告：彻底粉碎将抹除本机该卡片的物理数据（释放空间）。\n此操作通过增量引擎同步后，也会在其他设备上将其抹除。\n\n不可逆，继续吗？")) return;
            
            const item = allItems.find(i => i.id === id);
            if (item) {
                item.isDeleted = true; 
                item.htmlContent = ""; 
                item.dateAdded = new Date().getTime(); 
                
                if (accessToken && item.driveFileId) {
                    try {
                        await fetchDriveAPI(`https://www.googleapis.com/drive/v3/files/${item.driveFileId}`, { method: 'DELETE' });
                        item.driveFileId = null;
                    } catch(e) { console.warn("尝试删除云端文件失败"); }
                }
                
                saveToStorage();
                renderApp();
                showToast('物理数据已彻底剥离粉碎', 'success');
            }
        }

        function getItemsForSimulatedDate() {
            const dueDays = [0, 1, 3, 7, 15, 30];
            const startOfSimulated = new Date(simulatedDate);
            startOfSimulated.setHours(0, 0, 0, 0);

            return allItems.filter(item => {
                if(item.trashed || item.isDeleted) return false; 
                
                const startOfAdded = new Date(item.dateAdded);
                startOfAdded.setHours(0, 0, 0, 0);
                if (startOfSimulated < startOfAdded) return false;
                const diffTime = Math.abs(startOfSimulated - startOfAdded);
                const daysPassed = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                return dueDays.includes(daysPassed);
            });
        }

            simulatedDate.setDate(simulatedDate.getDate() + days);

        // ================= 编辑器与杂项 =================
        function setupRichTextEditorEvents() {
            const editor = document.getElementById('rich-input');
            editor.addEventListener('paste', (e) => {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let index in items) {
                    const item = items[index];
                    if (item.kind === 'file' && item.type.includes('image/')) {
                        e.preventDefault(); 
                        processAndInsertImage(item.getAsFile());
                        return; 
                    }
                }
            });
            editor.addEventListener('dragover', (e) => { e.preventDefault(); editor.classList.add('drag-over'); });
            editor.addEventListener('dragleave', (e) => { e.preventDefault(); editor.classList.remove('drag-over'); });
            editor.addEventListener('drop', (e) => {
                e.preventDefault();
                editor.classList.remove('drag-over');
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0 && e.dataTransfer.files[0].type.includes('image/')) {
                    processAndInsertImage(e.dataTransfer.files[0]);
                }
            });
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) processAndInsertImage(file);
            event.target.value = ''; 
        }

        function processAndInsertImage(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                insertHtmlAtCursor(`<img src="${e.target.result}" alt="大图" />&nbsp;`);
                showToast('原图已完美插入，将在同步时化为碎片传输！', 'success');
            }
            reader.readAsDataURL(file);
        }

        function insertHtmlAtCursor(html) {
            const editor = document.getElementById('rich-input');
            editor.focus();
            let sel, range;
            if (window.getSelection) {
                sel = window.getSelection();
                if (sel.getRangeAt && sel.rangeCount) {
                    range = sel.getRangeAt(0);
                    if(editor.contains(range.commonAncestorContainer)) {
                        range.deleteContents();
                        const el = document.createElement("div");
                        el.innerHTML = html;
                        const frag = document.createDocumentFragment();
                        let node, lastNode;
                        while ((node = el.firstChild)) { lastNode = frag.appendChild(node); }
                        range.insertNode(frag);
                        if (lastNode) {
                            range = range.cloneRange();
                            range.setStartAfter(lastNode);
                            range.collapse(true);
                            sel.removeAllRanges();
                            sel.addRange(range);
                        }
                    } else editor.innerHTML += html;
                }
            }
        }

        function exportData() {
            if (allItems.length === 0) return showToast("没有数据可以导出", "error");
            showToast("正在打包原图数据，可能会需要几秒钟...", "success");
            setTimeout(() => {
                const dataStr = JSON.stringify(allItems);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `复习备份_原图无损版_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast("巨无霸本地备份导出成功！", "success");
            }, 100);
        }

        function copyCurrentToClipboard() {
            const dueItems = getItemsForSimulatedDate();
            if(dueItems.length === 0) return;
            const item = dueItems[currentIndex];
            const tempDiv = document.createElement("div");
            tempDiv.innerHTML = item.htmlContent;
            tempDiv.innerHTML = tempDiv.innerHTML.replace(/<br\s*[\/]?>/gi, "\n").replace(/<p>/gi, "").replace(/<\/p>/gi, "\n");
            let textToCopy = tempDiv.innerText || tempDiv.textContent;
            
            if (textToCopy.trim() === '' && item.htmlContent.includes('<img')) {
                return showToast("当前是纯图片任务，请手动右键保存或截图。", "error");
            }
            const textarea = document.createElement('textarea');
            textarea.value = textToCopy.trim();
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast("文字部分已提取至剪贴板！", "success");
            } catch (err) {
                showToast("复制失败，请手动选择复制", "error");
            }
            document.body.removeChild(textarea);
        }

        function requestNotificationPermission() {
            if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }

        function startNotificationCron() {
            const schedule = {
                1: ["16:00", "17:15", "18:00", "18:30"],
                2: ["16:00", "17:15", "18:00", "18:30"],
                3: ["21:30", "22:10"],
                4: ["18:45", "19:45"],
                5: ["21:30", "22:10"],
                6: ["18:45", "19:20", "20:00"],
                0: ["18:45", "19:20", "20:00"]
            };
            setInterval(() => {
                const now = new Date();
                const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                if (schedule[now.getDay()] && schedule[now.getDay()].includes(timeStr) && now.getSeconds() < 2) {
                    if (Notification.permission === "granted") {
                        new Notification("复习时间到！", { body: "有任务需要你验收", icon: "https://cdn-icons-png.flaticon.com/512/3246/3246633.png" });
                    }
                }
            }, 1000); 
        }

        let toastTimeout;
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-message').innerText = message;
            
            if (type === 'success') {
                icon.innerHTML = `<svg class="w-5 h-5 text-green-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            } else {
                icon.innerHTML = `<svg class="w-5 h-5 text-red-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }
            toast.classList.remove('opacity-0');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.add('opacity-0'), 3000);
        }
    </script>
</body>
